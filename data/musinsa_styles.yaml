# 매칭 규칙
matching_rules:
  brand_score: 3
  keyword_score: 1
  tiebreaker: brand_priority  # 동점 시 브랜드 매칭 우선
  min_score_threshold: 1  # 이 이하면 LLM 폴백 호출
  case_sensitive: false
  normalize:
    - lowercase
    - strip_punctuation
    - korean_english_both  # "Nike"와 "나이키" 모두 매칭

# LLM 폴백 설정
llm_fallback:
  enabled: true
  model: claude-sonnet-4-5
  prompt: |
    너는 한국 패션 스타일 분류기다. 아래 브랜드와 제품 정보를 보고
    무신사 15개 공식 스타일 중 가장 적합한 1개를 선택하라.
    
    스타일 목록: 캐주얼, 스트릿, 미니멀, 걸리시, 스포티, 로맨틱, 
    클래식, 시크, 워크웨어, 시티보이, 고프코어, 레트로, 프레피, 
    리조트, 에스닉
    
    JSON으로만 응답: {"style": "...", "confidence": 0.0~1.0, "reason": "..."}
